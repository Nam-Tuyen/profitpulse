<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B0764;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Heart/cloud outline shape (stroke only) -->
  <path d="
    M 60 96
    C 30 80, 8 62, 8 42
    C 8 26, 20 16, 34 16
    C 44 16, 53 21, 60 30
    C 67 21, 76 16, 86 16
    C 100 16, 112 26, 112 42
    C 112 62, 90 80, 60 96 Z"
    fill="none"
    stroke="url(#heartGrad)"
    stroke-width="7"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Inner angular N / pulse bolt -->
  <path d="
    M 42 34
    L 34 68
    L 50 68
    L 40 90
    L 72 52
    L 56 52
    L 66 34
    Z"
    fill="url(#boltGrad)"
  />
</svg>
